name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  test-and-secure:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest ruff bandit pip-audit
          python -m pip check

      - name: Lint with Ruff
        run: |
          ruff check .

      - name: Check formatting with Ruff
        run: |
          ruff format --check .

      - name: Security scan with Bandit
        run: |
          bandit -r osint_core/ -ll --exclude "*/tests/*"

      - name: Audit Python dependencies
        run: |
          pip-audit -r requirements.txt --progress-spinner off

      - name: Run tests
        env:
          ALLOW_DEV_SALT: "true"
        run: |
          pytest -v --tb=short

  drift-guard:
    runs-on: ubuntu-latest
    needs: test-and-secure
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install guard dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyYAML

      - name: Verify critical files exist
        run: |
          required_files=(
            "osint_core/intent.py"
            "osint_core/policy.py"
            "osint_core/validators.py"
            "data/sources.yaml"
          )

          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing critical file: $file"
              exit 1
            fi
          done

      - name: Prevent forbidden tools from entering repo
        run: |
          pattern='(^|[^[:alnum:]_-])(nmap|masscan|sqlmap|metasploit)([^[:alnum:]_-]|$)'

          if git grep -n -I -E "$pattern" -- . \
            ':(exclude).github/workflows/*' \
            ':(exclude)README.md' \
            ':(exclude)docs/*'; then
            echo "Forbidden tooling detected"
            exit 1
          fi

      - name: Enforce passive-first invariant
        run: |
          matches="$(git grep -n -I -E 'requests\.(get|post|put|patch|delete)\(' -- osint_core/ || true)"

          if [[ -n "$matches" ]]; then
            echo "$matches" | grep -v -E 'authorized|allow_active|explicit_scope' || true

            unsafe="$(echo "$matches" | grep -v -E 'authorized|allow_active|explicit_scope' || true)"
            if [[ -n "$unsafe" ]]; then
              echo "Potential unauthorized outbound request"
              echo "$unsafe"
              exit 1
            fi
          fi

      - name: Validate YAML integrity
        run: |
          python - <<'PY'
          import pathlib
          import yaml

          path = pathlib.Path("data/sources.yaml")

          with path.open(encoding="utf-8") as f:
              parsed = yaml.safe_load(f)

          if parsed is None:
              raise SystemExit("data/sources.yaml is empty")

          if not isinstance(parsed, (dict, list)):
              raise SystemExit("data/sources.yaml must parse to a mapping or list")

          print("YAML integrity check passed")
          PY

      - name: Check for raw indicator leakage
        run: |
          pattern='(example\.com|[A-Za-z0-9._%+-]+@gmail\.com|192\.168\.[0-9]{1,3}\.[0-9]{1,3})'

          if git grep -n -I -E "$pattern" -- osint_core/; then
            echo "Possible raw indicator leakage"
            exit 1
          fi
