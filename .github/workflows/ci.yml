name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  test-and-secure:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest ruff bandit pip-audit
          python -m pip check

      - name: Lint with Ruff
        run: |
          ruff check .

      - name: Check formatting with Ruff
        run: |
          ruff format --check .

      - name: Security scan with Bandit
        run: |
          bandit -r osint_core/ -ll --exclude "*/tests/*"

      - name: Audit Python dependencies
        run: |
          pip-audit -r requirements.txt --progress-spinner off

      - name: Run tests
        env:
          ALLOW_DEV_SALT: "true"
        run: |
          pytest -v --tb=short

  drift-guard:
    runs-on: ubuntu-latest
    needs: test-and-secure
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install guard dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyYAML

      - name: List guard rules
        run: |
          python scripts/ci_guard.py --list

      - name: Run CI drift guard
        run: |
          python scripts/ci_guard.py
